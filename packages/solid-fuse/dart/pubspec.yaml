name: solid_fuse
description: A framework that runs SolidJS inside Flutter via QuickJS, rendering native widgets from a reactive component tree.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.12.0-273.0.dev

dependencies:
  flutter:
    sdk: flutter
  fjs: ^2.1.0
  flutter_rust_bridge: ">=2.11.0 <2.12.0"
  http: ^1.2.0
  web_socket_channel: ^3.0.0
  path_provider: ^2.1.0
  crypto: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
